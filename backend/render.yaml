services:
  - type: web
    name: taskapp-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://task-management-rose-tau.vercel.app
    healthCheckPath: /api/health
    autoDeploy: true
    region: oregon